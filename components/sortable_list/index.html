<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.3/Sortable.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: transparent; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; padding: 2px 0; }
  #list { user-select: none; }
  .driver-item {
    display: flex;
    align-items: center;
    padding: 8px 12px;
    margin: 3px 0;
    border-radius: 6px;
    cursor: grab;
    background: #1a1a1a;
    color: #f0f0f0;
    font-size: 14px;
    transition: background 0.1s;
  }
  .driver-item:hover { background: #242424; }
  .driver-item:active { cursor: grabbing; }
  .driver-item.sortable-ghost { opacity: 0.35; }
  .driver-item.sortable-chosen { background: #2a2a2a; box-shadow: 0 2px 8px rgba(0,0,0,0.5); }
  .color-bar {
    width: 4px;
    height: 28px;
    border-radius: 2px;
    margin-right: 10px;
    flex-shrink: 0;
  }
  .position { color: #e10600; font-weight: bold; margin-right: 10px; min-width: 28px; font-size: 0.88em; }
  .name { font-weight: 600; flex: 1; }
  .team { font-size: 0.8em; margin-left: 10px; }
</style>
</head>
<body>
<div id="list"></div>
<script>
  let drivers = [];
  let teamColors = {};
  let sortable = null;

  function sendReady() {
    window.parent.postMessage({ type: "streamlit:componentReady", apiVersion: 1 }, "*");
  }

  function sendHeight() {
    const height = document.getElementById("list").scrollHeight + 12;
    window.parent.postMessage({ type: "streamlit:setFrameHeight", height }, "*");
  }

  function sendValue(value) {
    window.parent.postMessage({ type: "streamlit:setComponentValue", value, dataType: "json" }, "*");
  }

  function renderList() {
    const el = document.getElementById("list");
    el.innerHTML = "";
    drivers.forEach((d, i) => {
      const color = teamColors[d.Team] || "#555";
      const item = document.createElement("div");
      item.className = "driver-item";
      item.dataset.idx = i;
      item.innerHTML =
        `<div class="color-bar" style="background:${color}"></div>` +
        `<span class="position">P${d.Position}</span>` +
        `<span class="name">${d.Driver}</span>` +
        `<span class="team" style="color:${color}">${d.Team}</span>`;
      el.appendChild(item);
    });

    if (sortable) sortable.destroy();
    sortable = Sortable.create(el, {
      animation: 150,
      ghostClass: "sortable-ghost",
      chosenClass: "sortable-chosen",
      onEnd: function () {
        const items = el.querySelectorAll(".driver-item");
        const reordered = Array.from(items).map((item, i) => {
          const d = drivers[parseInt(item.dataset.idx)];
          item.dataset.idx = i;
          item.querySelector(".position").textContent = "P" + (i + 1);
          return Object.assign({}, d, { Position: i + 1 });
        });
        drivers = reordered;
        sendValue(reordered);
        sendHeight();
      }
    });

    sendHeight();
  }

  window.addEventListener("message", function (e) {
    const data = e.data;
    if (data.type === "streamlit:render") {
      drivers = data.args.drivers || [];
      teamColors = data.args.teamColors || {};
      renderList();
    }
  });

  sendReady();
</script>
</body>
</html>
